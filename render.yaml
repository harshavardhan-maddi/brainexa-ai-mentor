services:
  # 1. Frontend (Static Site)

  - type: web
    name: brainexa-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist

    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: brainexa-node-backend
          property: host
      - key: VITE_PY_BACKEND_URL
        fromService:
          type: web
          name: brainexa-py-backend
          property: host

  # 2. Node.js Backend
  - type: web
    name: brainexa-node-backend
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brainexa-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: brainexa-frontend
          property: host
      - key: PY_BACKEND_URL
        fromService:
          type: web
          name: brainexa-py-backend
          property: host
      - key: NODE_ENV
        value: production

  # 3. Python AI Backend
  - type: web
    name: brainexa-py-backend
    env: python
    plan: starter
    rootDir: server_py
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brainexa-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: brainexa-frontend
          property: host

databases:
  - name: brainexa-db
    plan: free
