services:
  # 1. Node.js Backend
  - type: web
    name: brainexa-node-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brainexa-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # 2. Python AI Backend
  - type: web
    name: brainexa-py-backend
    env: python
    plan: free
    rootDir: server_py
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: brainexa-db
          property: connectionString

databases:
  - name: brainexa-db
    plan: free
